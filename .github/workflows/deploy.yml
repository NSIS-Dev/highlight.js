name: "Deploy to GitHub Pages"

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "pages/**"
      - "src/**"
      - "astro.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Enable Corepack
        run: |
          corepack prepare pnpm@9.15.3 --activate
          corepack enable

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_store_path=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        name: Set up pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_store_path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Build docs
        run: pnpm run build:docs

      - uses: actions/upload-pages-artifact@e78e33bd1a67cdd9b7f6be7cab4e24ccfc07d1c4 # v4.0.0
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/deploy-pages@44e2c0750fc285e27e3b2353ac5e02ca82523b9b # v4.0.5
        id: deployment
